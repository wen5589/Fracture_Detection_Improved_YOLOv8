# Small-object / fine-grained friendly hyperparameters
lr0: 0.003
lrf: 0.1
optimizer: AdamW
momentum: 0.9
weight_decay: 0.01
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.05

box: 7.5
cls: 0.5
dfl: 1.5
label_smoothing: 0.03

hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 5.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.15
erasing: 0.2
copy_paste: 0.0
close_mosaic: 50
multi_scale: true
cos_lr: true